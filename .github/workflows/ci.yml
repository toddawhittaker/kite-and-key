name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  # Never cancel a push:main run mid-flight — that's the publish path.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # Pure-static checks: no DB, no Docker — fast, one `pnpm install`.
  static:
    runs-on: ubuntu-latest
    env:
      # Dummy values: typecheck/generate:types build the sanitized Payload
      # config but never open a DB connection or need a real JWT secret.
      PAYLOAD_SECRET: ci-dummy-secret-not-used-for-anything-real
      DATABASE_URI: postgres://postgres:postgres@localhost:5432/unused
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: lint
        run: pnpm lint

      - name: typecheck
        run: pnpm typecheck

      - name: generated-types drift
        run: pnpm generate:types && git diff --exit-code src/payload-types.ts

  # Unit + integration tests against a real Postgres — via docker compose,
  # reusing the exact dockerized dev/test harness (src/tests/helpers/db.ts,
  # migrate-before-boot) so there's no divergence between local and CI.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: build dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dev
          tags: kite-and-key:dev
          load: true
          cache-from: type=gha,scope=dev
          cache-to: type=gha,mode=max,scope=dev

      - name: write CI .env
        run: |
          cat >> .env <<EOF
          PAYLOAD_SECRET=ci-dummy-secret-not-used-for-anything-real
          SEED_ADMIN_EMAIL=ci-dummy@example.edu
          SEED_ADMIN_PASSWORD=ci-dummy-password-not-used
          NEXT_PUBLIC_SERVER_URL=http://localhost:3000
          EOF

      - name: start db
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --wait db

      - name: unit + integration tests (with coverage)
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm app pnpm test:coverage

  # Playwright e2e — own job so a flake is diagnosable in isolation and its
  # heavier runtime doesn't serialize behind `test`. Drives the `app`
  # container at the `webapp` compose-network alias (docker-compose.yml) —
  # no `--network host`, so this is the CI-and-local invocation alike.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: build dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dev
          tags: kite-and-key:dev
          load: true
          cache-from: type=gha,scope=dev
          cache-to: type=gha,mode=max,scope=dev

      - name: build e2e image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: e2e
          tags: kite-and-key:e2e
          load: true
          cache-from: type=gha,scope=e2e
          cache-to: type=gha,mode=max,scope=e2e

      - name: write CI .env
        # Real creds: admin.spec.ts `test.skip`s without them, which would
        # silently pass — these must be set so the login spec actually runs.
        run: |
          cat >> .env <<EOF
          PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET }}
          SEED_ADMIN_EMAIL=${{ secrets.SEED_ADMIN_EMAIL }}
          SEED_ADMIN_PASSWORD=${{ secrets.SEED_ADMIN_PASSWORD }}
          NEXT_PUBLIC_SERVER_URL=http://localhost:3000
          EOF

      - name: start stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml --profile e2e up -d --wait db app

      - name: seed
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm app pnpm seed

      - name: run e2e
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm e2e pnpm test:e2e

      - name: dump app logs
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color app

      - name: upload playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Production image: build-only validation on PRs, push to GHCR on
  # push:main. Gated on the three checks above so a broken build/test/e2e
  # never gets published.
  image:
    needs: [static, test, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/toddawhittaker/kite-and-key
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build (and push on push:main)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: prod
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=prod
          cache-to: type=gha,mode=max,scope=prod
