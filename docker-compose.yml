services:
  db:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kite_and_key
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      target: dev
      # Matches the container's non-root user to the host user so files
      # written into the bind-mounted tree (migrations, generated types)
      # aren't root-owned. Defaults to 1000 (the common single-user-Linux
      # default); override via a UID/GID in your .env if your host user
      # differs (`id -u` / `id -g`).
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'
    networks:
      default:
        # Alias not under the `.app` gTLD (Chromium force-upgrades bare
        # `app` to HTTPS via the static HSTS-preload list) — lets the `e2e`
        # service drive this container over the compose network.
        aliases:
          - webapp
    env_file:
      - .env
    environment:
      # Overrides any localhost value from .env — the compose service name
      # `db` is the only reachable hostname for Postgres from inside the
      # app container.
      DATABASE_URI: postgres://postgres:postgres@db:5432/kite_and_key
      # Unblocks the admin panel's /_next/* HMR/RSC requests from the
      # `webapp` origin (dev-server only — see next.config.ts).
      ALLOWED_DEV_ORIGINS: webapp
    volumes:
      - .:/app
      # Anonymous volumes so the bind mount above doesn't shadow the
      # container's own installed deps / build output.
      - /app/node_modules
      - /app/.next
    # If file-watching misbehaves in-container, uncomment:
    # environment:
    #   WATCHPACK_POLLING: 'true'
    #   CHOKIDAR_USEPOLLING: 'true'
    healthcheck:
      # Node 22's global fetch avoids needing curl/wget in the slim image.
      # Gates `--wait` and the `e2e` service's `depends_on`.
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s

  # Prod image smoke-test — kept behind a profile so `docker compose up`
  # stays dev by default. Run with: docker compose --profile prod up
  app-prod:
    profiles: [prod]
    build:
      context: .
      target: prod
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3001:3000'
    env_file:
      - .env
    environment:
      DATABASE_URI: postgres://postgres:postgres@db:5432/kite_and_key

  # Dedicated Playwright image — driven against the `app` service over the
  # compose network at the `webapp` alias (see above). Kept behind a
  # profile, mirroring `app-prod`, so it's opt-in both locally and in CI:
  #   docker compose --profile e2e up -d --wait db app
  #   docker compose run --rm app pnpm seed
  #   docker compose run --rm e2e pnpm test:e2e
  e2e:
    profiles: [e2e]
    build:
      context: .
      target: e2e
    depends_on:
      app:
        condition: service_healthy
    env_file:
      - .env
    environment:
      E2E_BASE_URL: http://webapp:3000
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}

volumes:
  pgdata:
